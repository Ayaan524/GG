name: SERVER

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:

      - name: Show OS
        shell: powershell
        run: |
          systeminfo | findstr /B /C:"OS Name" /C:"OS Version"

      - name: Optimize Windows
        shell: powershell
        run: |
          powercfg -setactive SCHEME_MIN
          reg add "HKCU\Control Panel\Desktop" /v MenuShowDelay /t REG_SZ /d 0 /f
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" /v VisualFXSetting /t REG_DWORD /d 2 /f

      - name: Enable RDP
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
          -Name "fDenyTSConnections" -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Set Password
        shell: powershell
        run: |
          $pass = ConvertTo-SecureString "P@ssw0rd!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $pass

      - name: Install Tailscale
        shell: powershell
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi -OutFile tailscale.msi
          Start-Process msiexec.exe -ArgumentList "/i tailscale.msi /quiet /norestart" -Wait

      - name: Connect Tailscale
        shell: powershell
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
          --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
          --hostname=gh-runner-${{ github.run_id }}

          Start-Sleep 10

          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV

      - name: Show Login
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "===== RDP ACCESS ====="
          Write-Host "IP: $env:TAILSCALE_IP"
          Write-Host "USER: runneradmin"
          Write-Host "PASS: P@ssw0rd!"
          Write-Host "======================"

      - name: Keep Runner Alive
        shell: powershell
        run: |
          while ($true) {
            Write-Host "Server running..."
            Start-Sleep 300
          }
